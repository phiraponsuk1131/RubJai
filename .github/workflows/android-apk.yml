name: Build RubJai APK
on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: "9.4.1" }
      - name: Restore Firebase config
        env: { GOOGLE_SERVICES_JSON_BASE64: "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" }
        run: echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
      - name: Restore signing key
        env: { ANDROID_KEYSTORE_BASE64: "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" }
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/rubjai-release.jks"
      - name: Build signed APK (no tests)
        env:
          SIGNING_STORE_FILE: "${{ runner.temp }}/rubjai-release.jks"
          SIGNING_STORE_PASSWORD: "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          SIGNING_KEY_ALIAS: "${{ secrets.ANDROID_KEY_ALIAS }}"
          SIGNING_KEY_PASSWORD: "${{ secrets.ANDROID_KEY_PASSWORD }}"
        run: gradle :app:assembleRelease --stacktrace
      - name: Package artifact
        run: |
          cp app/build/outputs/apk/release/app-release.apk RubJai-${GITHUB_SHA::7}.apk
          sha256sum RubJai-*.apk > RubJai.sha256
          $ANDROID_HOME/build-tools/36.0.0/apksigner verify --verbose RubJai-*.apk
      - uses: actions/upload-artifact@v4
        with:
          name: RubJai-${{ github.sha }}
          path: |
            RubJai-*.apk
            RubJai.sha256
      - name: Publish release for v* tag
        if: startsWith(github.ref, 'refs/tags/v')
        env: { GH_TOKEN: "${{ github.token }}" }
        run: gh release create "$GITHUB_REF_NAME" RubJai-*.apk RubJai.sha256 --title "RubJai $GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md --verify-tag
