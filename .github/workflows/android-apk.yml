name: Build RubJai APK
on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:
concurrency:
  group: rubjai-apk-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: "8.10.2" }
      - name: Restore Firebase config
        env: { GOOGLE_SERVICES_JSON_BASE64: "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" }
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          else
            cp app/google-services.example.json app/google-services.json
          fi
      - name: Restore signing key
        env: { ANDROID_KEYSTORE_BASE64: "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" }
        run: if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/rubjai-release.jks"; fi
      - name: Check Thai text integrity
        run: node scripts/check-text-integrity.js
      - name: Check private slip data is not committed
        run: node scripts/check-privacy.js
      - name: Check slip parser samples
        run: node scripts/check-slip-samples.js
      - name: Check slip sync window
        run: node scripts/check-slip-sync-window.js
      - name: Check redesigned UI flow
        run: node scripts/check-ui-flow.js
      - name: Check no-admin UI layout preview
        run: node scripts/check-ui-layout.js
      - name: Build APK (no tests)
        env:
          SIGNING_STORE_FILE: "${{ runner.temp }}/rubjai-release.jks"
          SIGNING_STORE_PASSWORD: "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          SIGNING_KEY_ALIAS: "${{ secrets.ANDROID_KEY_ALIAS }}"
          SIGNING_KEY_PASSWORD: "${{ secrets.ANDROID_KEY_PASSWORD }}"
        run: |
          if [ -s "$SIGNING_STORE_FILE" ]; then
            gradle :app:assembleRelease --build-cache --parallel --stacktrace
          else
            gradle :app:assembleDebug --build-cache --parallel --stacktrace
          fi
      - name: Android emulator smoke UI
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: bash scripts/emulator-smoke.sh
      - name: Upload emulator smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RubJai-emulator-smoke-${{ github.sha }}
          path: build/emulator-smoke
      - name: Package artifact
        run: |
          APK=$(find app/build/outputs/apk -name '*.apk' | head -1)
          cp "$APK" RubJai-${GITHUB_SHA::7}.apk
          sha256sum RubJai-*.apk > RubJai.sha256
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -o -name apksigner.bat | sort -V | tail -1)
          "$APKSIGNER" verify --verbose RubJai-*.apk
      - uses: actions/upload-artifact@v4
        with:
          name: RubJai-${{ github.sha }}
          path: |
            RubJai-*.apk
            RubJai.sha256
            APP_UPDATE_NOTES_TH.md
      - name: Publish release for v* tag
        if: startsWith(github.ref, 'refs/tags/v')
        env: { GH_TOKEN: "${{ github.token }}" }
        run: gh release create "$GITHUB_REF_NAME" RubJai-*.apk RubJai.sha256 APP_UPDATE_NOTES_TH.md --title "RubJai $GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md --verify-tag
